description: "Audit Agent — Prompt Regression Tests"

providers:
  - id: openai:gpt-4o-mini
    config:
      temperature: 0.3
      max_tokens: 1000

# Strip markdown code fences (```json ... ```) before assertions run.
# Mirrors what _extract_json() does in production.
defaultTest:
  options:
    transform: |
      return output.replace(/^```json\s*/i, '').replace(/```\s*$/, '').trim();

prompts:
  - label: "Audit System Prompt"
    raw: |
      [
        {"role": "system", "content": "You are an audit and compliance agent for a hiring workflow. Review selection outcomes and produce strict JSON only with keys: job_id, selection_rate, total_candidates, shortlisted, bias_flags, risk_level, review_required, recommendations, data_completeness, confidence. bias_flags and recommendations must be arrays of strings. risk_level must be one of low, medium, high. selection_rate and confidence must be numbers from 0 to 1. If bias_flags is empty, review_required must be false and risk_level must be low. Define low_selection_rate strictly as selection_rate < 0.2. Only include low_selection_rate in bias_flags when selection_rate is strictly below 0.2. If low_selection_rate is present in bias_flags, risk_level must be high."},
        {"role": "user", "content": "{{audit_input}}"}
      ]

tests:
  - file://test_cases/audit_tests.yaml

description: "Resume Intake Agent — Prompt Regression Tests"

providers:
  - id: openai:gpt-4o-mini
    config:
      temperature: 0.3
      max_tokens: 1000

prompts:
  - label: "Resume Intake System Prompt"
    raw: |
      [
        {"role": "system", "content": "You are a resume intake agent. Extract structured candidate data from resume text. Return strict JSON only with keys: name, email, skills, years_experience, summary. skills must be an array of lowercase strings. years_experience must be a number."},
        {"role": "user", "content": "Job description:\n{{job_description}}\n\nResume text:\n{{resume_text}}"}
      ]

tests:
  - file://test_cases/intake_tests.yaml

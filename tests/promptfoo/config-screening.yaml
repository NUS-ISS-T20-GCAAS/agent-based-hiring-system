description: "Screening Agent — Prompt Regression Tests"

providers:
  - id: openai:gpt-4o-mini
    config:
      temperature: 0.3
      max_tokens: 1000

# Strip markdown code fences (```json ... ```) if the LLM wraps its output.
# Mirrors what _extract_json() does in production.
defaultTest:
  options:
    transform: "output.replace(/^```(?:json)?\\s*/m, '').replace(/```\\s*$/m, '').trim()"

prompts:
  - label: "Screening System Prompt"
    raw: |
      [
        {"role": "system", "content": "You are a qualification screening agent for a hiring system. Your job is to evaluate candidates against job requirements and provide structured scoring data.\n\nFAIRNESS REQUIREMENT — you must strictly follow these rules:\n- Evaluate ONLY technical skills, years of relevant experience, and stated qualifications.\n- You MUST NOT consider, infer, or be influenced by: candidate name, gender, age, nationality, ethnicity, religion, marital status, socioeconomic background, or the prestige/location of educational institutions.\n- Do NOT use graduation year as a proxy for age.\n- Do NOT penalise non-linear career paths or employment gaps.\n- If demographic signals are present in the resume, ignore them entirely and focus only on skills and experience.\n\nYou must return ONLY valid JSON with these exact keys:\n- qualification_score: float 0-1\n- meets_threshold: boolean (true if score >= 0.6)\n- matched_skills: array of lowercase skill strings the candidate has\n- missing_skills: array of lowercase required skills the candidate lacks\n- years_experience: integer\n- confidence: float 0-1\n- explanation: string (2-3 sentences)\n\nReturn ONLY the JSON object, no other text."},
        {"role": "user", "content": "=== JOB DESCRIPTION ===\n{{job_description}}\n\n=== STRUCTURED REQUIREMENTS ===\n{{job_requirements}}\n\n=== CANDIDATE RESUME ===\n{{resume_data}}\n\n=== YOUR TASK ===\nEvaluate this candidate against the job requirements. Return a JSON object with the scoring data as specified in your system prompt."}
      ]

tests:
  - file://test_cases/screening_tests.yaml

description: "Skill Assessment Agent — Prompt Regression Tests"

providers:
  - id: openai:gpt-4o-mini
    config:
      temperature: 0.3
      max_tokens: 1000

prompts:
  - label: "Skill Assessment System Prompt"
    raw: |
      [
        {"role": "system", "content": "You are a skill assessment agent for a hiring system. Assess candidate competencies against a job and return strict JSON only. You must evaluate only stated technical and soft-skill evidence from the resume. Do not infer protected attributes or culture fit. Return exactly these keys: skills_score, matched_required_skills, matched_preferred_skills, missing_required_skills, missing_preferred_skills, detected_soft_skills, matched_soft_skills, missing_soft_skills, strengths, gaps, gap_analysis, confidence. All skill arrays must contain lowercase strings. skills_score and confidence must be numbers from 0 to 1."},
        {"role": "user", "content": "Job description:\n{{job_description}}\n\nStructured requirements:\n{{job_requirements}}\n\nParsed resume:\n{{parsed_resume}}\n\nResume text:\n{{resume_text}}"}
      ]

tests:
  - file://test_cases/skill_assessment_tests.yaml

name: Build Services

on:
  workflow_call:
    inputs:
      services:
        description: 'Comma-separated list of services to build (e.g., coordinator-agent,resume-intake-agent)'
        type: string
        required: false
        default: ''

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            coordinator-agent:
              - 'services/coordinator-agent/**'
            resume-intake-agent:
              - 'services/resume-intake-agent/**'
            screening-agent:
              - 'services/screening-agent/**'
            skill-assessment-agent:
              - 'services/skill-assessment-agent/**'
            ranking-agent:
              - 'services/ranking-agent/**'
            audit-agent:
              - 'services/audit-agent/**'

      # Decide final service list (SINGLE source of truth)
      - name: Set services list
        id: set-services
        shell: bash
        run: |
          # Use input services if provided, else use auto-detected list
          SERVICES="${{ inputs.services }}"
          
          if [ -n "$SERVICES" ]; then
            # Case 1: Manual Input (Single service, Comma list, or "all")
            if [ "$SERVICES" = "all" ]; then
              SERVICES="coordinator-agent,resume-intake-agent,screening-agent,skill-assessment-agent,ranking-agent,audit-agent"
            fi
            echo "Using manual service list: $SERVICES"
          else
            # Case 2: Auto Detection
            echo "No manual services list provided. Detecting changes..."
            S_LIST=()
            [[ "${{ steps.filter.outputs.coordinator-agent }}" == "true" ]] && S_LIST+=("coordinator-agent")
            [[ "${{ steps.filter.outputs.resume-intake-agent }}" == "true" ]] && S_LIST+=("resume-intake-agent")
            [[ "${{ steps.filter.outputs.screening-agent }}" == "true" ]] && S_LIST+=("screening-agent")
            [[ "${{ steps.filter.outputs.skill-assessment-agent }}" == "true" ]] && S_LIST+=("skill-assessment-agent")
            [[ "${{ steps.filter.outputs.ranking-agent }}" == "true" ]] && S_LIST+=("ranking-agent")
            [[ "${{ steps.filter.outputs.audit-agent }}" == "true" ]] && S_LIST+=("audit-agent")
            
            # Combine into a comma-separated list
            SERVICES=$(IFS=,; echo "${S_LIST[*]}")
            echo "Auto-detected services: $SERVICES"
          fi
          
          # Final validation and format conversion
          if [ -n "$SERVICES" ]; then
            # Format the output for the matrix array
            JSON=$(printf '["%s"]' "${SERVICES//,/\",\"}")
            echo "services=$JSON" >> $GITHUB_OUTPUT
            echo "Final matrix output: $JSON"
          else
            echo "services=[]" >> $GITHUB_OUTPUT
            echo "No changes detected requiring a build."
          fi

      - name: Debug services
        run: |
          echo "Selected services to build: ${{ steps.set-services.outputs.services }}"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repository name
        run: |
          echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log build target
        run: |
          echo "Building service: ${{ matrix.service }}"

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ github.sha }} \
            services/${{ matrix.service }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ github.sha }}

      - name: Record successful build
        run: echo "${{ matrix.service }}" > success-${{ matrix.service }}.txt

      - name: Upload successful build
        uses: actions/upload-artifact@v4
        with:
          name: success-${{ matrix.service }}
          path: success-${{ matrix.service }}.txt
          retention-days: 1

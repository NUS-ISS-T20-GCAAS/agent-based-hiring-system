name: Build Services

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_call:
    inputs:
      services:
        description: 'Comma-separated list of services to build (e.g., coordinator-agent,resume-intake-agent)'
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      services:
        description: 'Select service(s) to build'
        type: choice
        options:
          - all
          - coordinator-agent
          - resume-intake-agent
          - screening-agent
          - ranking-agent
          - audit-agent
        required: true
        default: 'all'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Detect changed services (push / PR only)
      - name: Detect service changes
        uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          list-files: json
          filters: |
            coordinator-agent:
              - services/coordinator-agent/**
            resume-intake-agent:
              - services/resume-intake-agent/**
            screening-agent:
              - services/screening-agent/**
            ranking-agent:
              - services/ranking-agent/**
            audit-agent:
              - services/audit-agent/**

      # Decide final service list (SINGLE source of truth)
      - name: Set services list
        id: set-services
        shell: bash
        run: |
          # 1. Grab services from workflow_call inputs first
          if [ -n "${{ inputs.services }}" ]; then
            SERVICES="${{ inputs.services }}"
          # 2. Or grab from manual workflow_dispatch inputs
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICES="${{ github.event.inputs.services }}"
          fi

          if [ -n "$SERVICES" ]; then
            # Handle the "all" option explicitly
            if [ "$SERVICES" = "all" ]; then
              SERVICES="coordinator-agent,resume-intake-agent,screening-agent,ranking-agent,audit-agent"
            fi
            
            # Format the output for the matrix array
            JSON=$(printf '["%s"]' "${SERVICES//,/\",\"}")
            echo "services=$JSON" >> $GITHUB_OUTPUT

          else
            SERVICES='${{ steps.filter.outputs.changes }}'

            if [ "$SERVICES" = "[]" ] || [ -z "$SERVICES" ]; then
              echo "services=[]" >> $GITHUB_OUTPUT
            else
              echo "services=$SERVICES" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Debug services
        run: |
          echo "Services to build: ${{ steps.set-services.outputs.services }}"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repository name
        run: |
          echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log build target
        run: |
          echo "Building service: ${{ matrix.service }}"

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ github.sha }} \
            services/${{ matrix.service }}

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ github.sha }}

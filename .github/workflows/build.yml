name: Build Services

on:
  workflow_call:
    inputs:
      services:
        description: 'Comma-separated list of services to build (e.g., coordinator-agent,resume-intake-agent)'
        type: string
        required: false
        default: ''

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Decide final service list (SINGLE source of truth)
      - name: Set services list
        id: set-services
        shell: bash
        run: |
          SERVICES="${{ inputs.services }}"

          if [ -n "$SERVICES" ]; then
            # Handle the "all" option explicitly
            if [ "$SERVICES" = "all" ]; then
              SERVICES="coordinator-agent,resume-intake-agent,screening-agent,ranking-agent,audit-agent"
            fi
            
            # Format the output for the matrix array
            JSON=$(printf '["%s"]' "${SERVICES//,/\",\"}")
            echo "services=$JSON" >> $GITHUB_OUTPUT
          else
            echo "services=[]" >> $GITHUB_OUTPUT
          fi

      - name: Debug services
        run: |
          echo "Services to build: ${{ steps.set-services.outputs.services }}"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repository name
        run: |
          echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log build target
        run: |
          echo "Building service: ${{ matrix.service }}"

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ github.sha }} \
            services/${{ matrix.service }}

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ github.sha }}

      - name: Record successful build
        run: echo "${{ matrix.service }}" > success-${{ matrix.service }}.txt

      - name: Upload successful build
        uses: actions/upload-artifact@v4
        with:
          name: success-${{ matrix.service }}
          path: success-${{ matrix.service }}.txt
          retention-days: 1

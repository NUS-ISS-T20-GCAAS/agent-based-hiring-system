name: Deploy Frontend

on:
  push:
    paths:
      - frontend/**
  pull_request:
    paths:
      - frontend/**
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
      image_tag:
        description: "Exact image tag to deploy (leave blank to build current commit)"
        required: false
        type: string

env:
  TF_DIR: infra/terraform
  TF_VERSION: "1.12.2"
  AWS_REGION: "ap-southeast-1"

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  # ── 1. Reusable Build Job (Calling the Template) ──
  build:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image_tag == '' }}
    uses: ./.github/workflows/frontend-build.yml
    with:
      image_tag: ${{ github.sha }}
    secrets: inherit

  # ── 2. Deploy Job ──
  deploy:
    # Run if build succeeds OR if we manually bypassed build with an explicit image tag
    if: ${{ always() && (needs.build.result == 'success' || (github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '')) && github.event_name != 'pull_request' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '' && github.event.inputs.image_tag || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show deployment target
        run: |
          echo "Environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}"
          echo "Image tag: ${IMAGE_TAG}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      - name: Get AWS Info & Terraform Outputs
        id: tf-outputs
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          EKS_CLUSTER=$(terraform output -raw eks_cluster_name)
          FRONTEND_ECR_URL=$(terraform output -json ecr_repository_urls | jq -r '.frontend')
          
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "eks_cluster=$EKS_CLUSTER" >> "$GITHUB_OUTPUT"
          echo "frontend_ecr_url=$FRONTEND_ECR_URL" >> "$GITHUB_OUTPUT"
        working-directory: ${{ env.TF_DIR }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Transfer Image (GHCR → ECR)
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          GHCR_IMAGE="ghcr.io/${REPO_LOWER}/frontend:${IMAGE_TAG}"
          ECR_URL="${{ steps.tf-outputs.outputs.frontend_ecr_url }}"
          ECR_IMAGE="${ECR_URL}:${IMAGE_TAG}"

          echo "Logging into GHCR..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          echo "Pulling from GHCR: $GHCR_IMAGE"
          docker pull $GHCR_IMAGE

          echo "Tagging image for ECR: $ECR_IMAGE"
          docker tag $GHCR_IMAGE $ECR_IMAGE

          echo "Pushing to ECR: $ECR_IMAGE"
          docker push $ECR_IMAGE

          echo "ecr_image=$ECR_IMAGE" >> "$GITHUB_ENV"

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name ${{ steps.tf-outputs.outputs.eks_cluster }} \
            --region ${{ env.AWS_REGION }}

      - name: Replace Placeholders in Manifest
        run: |
          ACCOUNT_ID="${{ steps.tf-outputs.outputs.account_id }}"
          REGION="${{ env.AWS_REGION }}"
          
          sed -i "s/<ACCOUNT_ID>/$ACCOUNT_ID/g" ${{ env.TF_DIR }}/k8s/frontend-deployment.yaml
          sed -i "s/<REGION>/$REGION/g" ${{ env.TF_DIR }}/k8s/frontend-deployment.yaml
          sed -i "s/<IMAGE_TAG>/${IMAGE_TAG}/g" ${{ env.TF_DIR }}/k8s/frontend-deployment.yaml
          
      - name: Apply Blueprint to Kubernetes
        run: |
          kubectl apply -f ${{ env.TF_DIR }}/k8s/frontend-deployment.yaml
          
      - name: Verify Rollout Status
        run: |
          echo "Waiting for rollout to complete..."
          kubectl rollout status deployment/frontend -n frontend --timeout=300s
          
      - name: Show Deployment Status
        if: always()
        run: |
          echo "=== Frontend Pods ==="
          kubectl get pods -n frontend
          echo ""
          echo "=== Frontend Service (LoadBalancer URL) ==="
          kubectl get svc -n frontend

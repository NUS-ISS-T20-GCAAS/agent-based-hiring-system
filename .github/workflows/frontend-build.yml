name: Build Frontend

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to build and push to GHCR"
        required: true
        type: string
      vite_ws_url:
        description: "WebSocket URL mapped to the Nginx backend (e.g. wss://domain.com/api/ws)"
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: SAST Scan with Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/javascript

      - name: Set lowercase repository name
        run: |
          echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Run unit tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg VITE_WS_URL="${{ inputs.vite_ws_url }}" \
            -t ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ inputs.image_tag }} \
            frontend

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ inputs.image_tag }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ inputs.image_tag }}

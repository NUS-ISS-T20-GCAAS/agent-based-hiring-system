name: LLM Evaluation

on:
  workflow_call:
  pull_request:
    paths:
      - 'services/*/app/llm.py'
      - 'services/*/app/worker.py'
      - 'services/*/app/agent.py'
      - 'tests/deepeval/**'
      - 'tests/promptfoo/**'
  push:
    paths:
      - 'services/*/app/llm.py'
      - 'services/*/app/worker.py'
      - 'services/*/app/agent.py'
      - 'tests/deepeval/**'
      - 'tests/promptfoo/**'
  workflow_dispatch:
    inputs:
      live_api:
        description: 'Run with live OpenAI API'
        type: boolean
        default: true

jobs:
  deepeval:
    name: DeepEval LLM Evaluation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r tests/deepeval/requirements.txt

      - name: Run DeepEval tests
        run: pytest tests/deepeval/ -v --tb=short
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPEVAL_MODEL: gpt-4o-mini

  promptfoo:
    name: Promptfoo Regression Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Promptfoo
        run: npm install -g promptfoo

      - name: Eval — Resume Intake Agent
        run: |
          for attempt in 1 2 3; do
            promptfoo eval --config tests/promptfoo/config-intake.yaml --no-cache && break
            if [ "$attempt" -eq 3 ]; then
              echo "Resume Intake eval failed after 3 attempts"
              exit 1
            fi
            echo "Resume Intake eval failed (attempt $attempt), retrying..."
            sleep 5
          done
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Eval — Screening Agent
        run: |
          for attempt in 1 2 3; do
            promptfoo eval --config tests/promptfoo/config-screening.yaml --no-cache && break
            if [ "$attempt" -eq 3 ]; then
              echo "Screening eval failed after 3 attempts"
              exit 1
            fi
            echo "Screening eval failed (attempt $attempt), retrying..."
            sleep 5
          done
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Eval — Skill Assessment Agent
        run: |
          for attempt in 1 2 3; do
            promptfoo eval --config tests/promptfoo/config-skill-assessment.yaml --no-cache && break
            if [ "$attempt" -eq 3 ]; then
              echo "Skill Assessment eval failed after 3 attempts"
              exit 1
            fi
            echo "Skill Assessment eval failed (attempt $attempt), retrying..."
            sleep 5
          done
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Eval — Audit Agent
        run: |
          for attempt in 1 2 3; do
            promptfoo eval --config tests/promptfoo/config-audit.yaml --no-cache && break
            if [ "$attempt" -eq 3 ]; then
              echo "Audit eval failed after 3 attempts"
              exit 1
            fi
            echo "Audit eval failed (attempt $attempt), retrying..."
            sleep 5
          done
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

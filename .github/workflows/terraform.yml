name: Terraform Infrastructure

on:
  push:
    branches: [ main ]
    paths:
      - 'infra/terraform/**'
  pull_request:
    paths:
      - 'infra/terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev

env:
  TF_DIR: infra/terraform
  TF_VERSION: "1.12.2"
  AWS_REGION: "ap-southeast-1"

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_DIR }}
      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ env.TF_DIR }}
      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_DIR }}

  plan:
    name: Plan
    needs: validate
    runs-on: ubuntu-latest
    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}" \
            -no-color \
            -out=tfplan \
            2>&1 | tee plan_output.txt
        working-directory: ${{ env.TF_DIR }}
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'dev' }}
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 5

  apply:
    name: Apply
    needs: plan
    runs-on: ubuntu-latest
    environment: terraform-${{ github.event.inputs.environment || 'dev' }}
    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'dev' }}
          path: ${{ env.TF_DIR }}
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_DIR }}
      - name: Output Results
        if: success()
        run: terraform output -no-color
        working-directory: ${{ env.TF_DIR }}

  # ════════════════════════════════════════════════
  #  Deploy K8s Manifests (after plan succeeds)
  # ════════════════════════════════════════════════
  deploy-k8s:
    name: Deploy K8s
    needs: plan
    runs-on: ubuntu-latest
    environment: k8s-${{ github.event.inputs.environment || 'dev' }}
    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      - name: Get AWS Account ID
        id: aws-info
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Get Terraform Outputs
        id: tf-outputs
        run: |
          EKS_CLUSTER=$(terraform output -raw eks_cluster_name)
          RDS_HOST=$(terraform output -raw rds_hostname)
          VPC_ID=$(terraform output -raw vpc_id)
          ACM_ARN=$(terraform output -raw acm_certificate_arn 2>/dev/null || echo "")
          ALB_ROLE_ARN=$(terraform output -raw alb_controller_role_arn)
          SUBNETS=$(terraform output -json public_subnet_ids | jq -r 'join(",")')

          echo "eks_cluster=$EKS_CLUSTER" >> "$GITHUB_OUTPUT"
          echo "rds_host=$RDS_HOST" >> "$GITHUB_OUTPUT"
          echo "vpc_id=$VPC_ID" >> "$GITHUB_OUTPUT"
          echo "acm_arn=$ACM_ARN" >> "$GITHUB_OUTPUT"
          echo "alb_role_arn=$ALB_ROLE_ARN" >> "$GITHUB_OUTPUT"
          echo "subnets=$SUBNETS" >> "$GITHUB_OUTPUT"
        working-directory: ${{ env.TF_DIR }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name ${{ steps.tf-outputs.outputs.eks_cluster }} \
            --region ${{ env.AWS_REGION }}

      - name: Install AWS Load Balancer Controller (Helm)
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update

          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=${{ steps.tf-outputs.outputs.eks_cluster }} \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ steps.tf-outputs.outputs.alb_role_arn }} \
            --set region=${{ env.AWS_REGION }} \
            --set vpcId=${{ steps.tf-outputs.outputs.vpc_id }}

          # Wait for controller pods to be ready before applying Ingress
          echo "Waiting for ALB controller pods to be ready..."
          kubectl rollout status deployment/aws-load-balancer-controller -n kube-system --timeout=120s

      - name: Replace Placeholders in K8s Manifests
        run: |
          ACCOUNT_ID="${{ steps.aws-info.outputs.account_id }}"
          REGION="${{ env.AWS_REGION }}"

          # Fetch the exact image tag from each live deployment (fallback to 'latest')
          FE_TAG=$(kubectl get deployment frontend -n frontend -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null | awk -F: '{print $NF}')
          COORD_TAG=$(kubectl get deployment coordinator-agent -n services -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null | awk -F: '{print $NF}')
          RESUME_TAG=$(kubectl get deployment resume-intake-agent -n services -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null | awk -F: '{print $NF}')
          SCREEN_TAG=$(kubectl get deployment screening-agent -n services -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null | awk -F: '{print $NF}')
          AUDIT_TAG=$(kubectl get deployment audit-agent -n services -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null | awk -F: '{print $NF}')
          RANKING_TAG=$(kubectl get deployment ranking-agent -n services -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null | awk -F: '{print $NF}')

          FE_TAG=${FE_TAG:-latest}
          COORD_TAG=${COORD_TAG:-latest}
          RESUME_TAG=${RESUME_TAG:-latest}
          SCREEN_TAG=${SCREEN_TAG:-latest}
          AUDIT_TAG=${AUDIT_TAG:-latest}
          RANKING_TAG=${RANKING_TAG:-latest}

          echo "Image tags:"
          echo "  frontend:            $FE_TAG"
          echo "  coordinator-agent:   $COORD_TAG"
          echo "  resume-intake-agent: $RESUME_TAG"
          echo "  screening-agent:     $SCREEN_TAG"
          echo "  audit-agent:         $AUDIT_TAG"
          echo "  ranking-agent:       $RANKING_TAG"

          # Replace account and region in all deployment files
          for file in ${{ env.TF_DIR }}/k8s/*-deployment.yaml; do
            sed -i "s/<ACCOUNT_ID>/$ACCOUNT_ID/g" "$file"
            sed -i "s/<REGION>/$REGION/g" "$file"
            echo "Updated: $file"
          done

          # Replace <IMAGE_TAG> with each service's specific tag
          sed -i "s/<IMAGE_TAG>/$FE_TAG/g" ${{ env.TF_DIR }}/k8s/frontend-deployment.yaml

          # Replace domain/HTTPS placeholders
          sed -i "s|<ACM_CERTIFICATE_ARN>|${{ steps.tf-outputs.outputs.acm_arn }}|g" ${{ env.TF_DIR }}/k8s/frontend-deployment.yaml
          sed -i "s/<PUBLIC_SUBNET_IDS>/${{ steps.tf-outputs.outputs.subnets }}/g" ${{ env.TF_DIR }}/k8s/frontend-deployment.yaml

          sed -i "s/<IMAGE_TAG>/$COORD_TAG/g" ${{ env.TF_DIR }}/k8s/coordinator-agent-deployment.yaml
          sed -i "s/<IMAGE_TAG>/$RESUME_TAG/g" ${{ env.TF_DIR }}/k8s/resume-intake-agent-deployment.yaml
          sed -i "s/<IMAGE_TAG>/$SCREEN_TAG/g" ${{ env.TF_DIR }}/k8s/screening-agent-deployment.yaml
          sed -i "s/<IMAGE_TAG>/$AUDIT_TAG/g" ${{ env.TF_DIR }}/k8s/audit-agent-deployment.yaml 2>/dev/null || true
          sed -i "s/<IMAGE_TAG>/$RANKING_TAG/g" ${{ env.TF_DIR }}/k8s/ranking-agent-deployment.yaml 2>/dev/null || true

          echo ""
          echo "Final image references:"
          grep -h "image:" ${{ env.TF_DIR }}/k8s/*-deployment.yaml || true

      - name: Generate K8s Secrets
        run: |
          RDS_HOST="${{ steps.tf-outputs.outputs.rds_host }}"
          DB_USER="${{ secrets.TF_VAR_DB_USERNAME || 'dbadmin' }}"
          DB_PASS="${{ secrets.TF_VAR_DB_PASSWORD }}"
          OPENAI_KEY="${{ secrets.OPENAI_API_KEY }}"

          cat > ${{ env.TF_DIR }}/k8s/secrets.yaml <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: hiring-system-secrets
            namespace: services
          type: Opaque
          data:
            openai-api-key: $(echo -n "$OPENAI_KEY" | base64 -w0)
            db-host: $(echo -n "$RDS_HOST" | base64 -w0)
            db-username: $(echo -n "$DB_USER" | base64 -w0)
            db-password: $(echo -n "$DB_PASS" | base64 -w0)
          EOF

      - name: Apply K8s Manifests
        run: |
          echo "=== Applying Namespaces ==="
          kubectl apply -f ${{ env.TF_DIR }}/k8s/namespaces.yaml

          echo "=== Applying Secrets ==="
          kubectl apply -f ${{ env.TF_DIR }}/k8s/secrets.yaml

          echo "=== Applying Deployments ==="
          kubectl apply -f ${{ env.TF_DIR }}/k8s/frontend-deployment.yaml
          kubectl apply -f ${{ env.TF_DIR }}/k8s/coordinator-agent-deployment.yaml
          kubectl apply -f ${{ env.TF_DIR }}/k8s/resume-intake-agent-deployment.yaml
          kubectl apply -f ${{ env.TF_DIR }}/k8s/screening-agent-deployment.yaml
          kubectl apply -f ${{ env.TF_DIR }}/k8s/audit-agent-deployment.yaml 2>/dev/null || true
          kubectl apply -f ${{ env.TF_DIR }}/k8s/ranking-agent-deployment.yaml 2>/dev/null || true

      - name: Verify Deployment
        run: |
          echo "=== Frontend Pods ==="
          kubectl get pods -n frontend
          echo ""
          echo "=== Service Pods ==="
          kubectl get pods -n services
          echo ""
          echo "=== Frontend Service (LoadBalancer URL) ==="
          kubectl get svc -n frontend
          echo ""
          echo "=== HPAs ==="
          kubectl get hpa -n services

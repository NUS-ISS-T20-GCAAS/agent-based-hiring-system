services:
  resume-intake-agent:
    build: ./resume-intake-agent
    ports:
      - "8001:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 2s
      retries: 5

  screening-agent:
    build: ./screening-agent
    ports:
      - "8002:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 2s
      retries: 5

  skill-assessment-agent:
    build: ./skill-assessment-agent
    ports:
      - "8005:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 2s
      retries: 5

  ranking-agent:
    build: ./ranking-agent
    ports:
      - "8004:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 2s
      retries: 5

  audit-agent:
    build: ./audit-agent
    ports:
      - "8003:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 2s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  coordinator:
    build: ./coordinator-agent
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - RANKING_AGENT_URL=http://ranking-agent:8000
      - AUDIT_AGENT_URL=http://audit-agent:8000
      - SKILL_ASSESSMENT_AGENT_URL=http://skill-assessment-agent:8000
      - RESUME_INTAKE_AGENT_URL=http://resume-intake-agent:8000
      - SCREENING_AGENT_URL=http://screening-agent:8000
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=hiring_system
      - DB_USER=user
      - DB_PASSWORD=password
    depends_on:
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      resume-intake-agent:
        condition: service_healthy
      skill-assessment-agent:
        condition: service_healthy
      screening-agent:
        condition: service_healthy
      ranking-agent:
        condition: service_healthy
      audit-agent:
        condition: service_healthy

  celery-worker:
    build: ./coordinator-agent
    command: celery -A app.celery_app:celery worker --loglevel=info --queues=workflow --concurrency=4
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - RESUME_INTAKE_AGENT_URL=http://resume-intake-agent:8000
      - SKILL_ASSESSMENT_AGENT_URL=http://skill-assessment-agent:8000
      - SCREENING_AGENT_URL=http://screening-agent:8000
      - RANKING_AGENT_URL=http://ranking-agent:8000
      - AUDIT_AGENT_URL=http://audit-agent:8000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=hiring_system
      - DB_USER=user
      - DB_PASSWORD=password
    depends_on:
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      resume-intake-agent:
        condition: service_healthy
      skill-assessment-agent:
        condition: service_healthy
      screening-agent:
        condition: service_healthy
      ranking-agent:
        condition: service_healthy
      audit-agent:
        condition: service_healthy

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: hiring_system
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d hiring_system"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  db-migrate:
    image: postgres:15
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: []
    command:
      - /bin/sh
      - -ec
      - |
        psql -h postgres -p 5432 -U user -d hiring_system -v ON_ERROR_STOP=1 -f /seed/init_db.sql
        for file in /migrations/*.sql; do
          [ -f "$$file" ] || continue
          echo "Applying migration: $$(basename "$$file")"
          psql -h postgres -p 5432 -U user -d hiring_system -v ON_ERROR_STOP=1 -f "$$file"
        done
    environment:
      PGPASSWORD: password
    volumes:
      - ../db/init_db.sql:/seed/init_db.sql:ro
      - ../db/migrations:/migrations:ro

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlruns/mlflow.db --default-artifact-root /mlruns/artifacts
    volumes:
      - mlflow-data:/mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mlflow-data:

services:
  resume-intake-agent:
    build: ./resume-intake-agent
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 2s
      retries: 5

  screening-agent:
    build: ./screening-agent
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 2s
      retries: 5

  coordinator:
    build: ./coordinator-agent
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=hiring_system
      - DB_USER=user
      - DB_PASSWORD=password
    depends_on:
      resume-intake-agent:
        condition: service_healthy
      screening-agent:
        condition: service_healthy

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: hiring_system
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ../db/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
      - ../db/migrations:/migrations

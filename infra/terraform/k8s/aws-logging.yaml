# ──────────────────────────────────────────────────────────────────────────────
# aws-observability Namespace + aws-logging ConfigMap
#
# The Fargate log router (fluent-bit sidecar) ONLY looks for the ConfigMap
# named "aws-logging" in the "aws-observability" namespace — NOT in the
# application namespace. The namespace MUST have the label:
#   aws-observability: enabled
#
# This single ConfigMap applies to ALL Fargate pods across ALL namespaces.
#
# Ref: https://docs.aws.amazon.com/eks/latest/userguide/fargate-logging.html
# ──────────────────────────────────────────────────────────────────────────────

# ── Required namespace with mandatory label ───────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: aws-observability
  labels:
    aws-observability: enabled
---
# ── Fluent Bit config for Fargate log router ──────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-logging
  namespace: aws-observability
data:
  flb_log_cw: "true"
  output.conf: |
    [OUTPUT]
        Name              cloudwatch_logs
        Match             *
        region            ap-southeast-1
        log_group_name    /aws/eks/hiring-system-dev/fargate/services
        log_stream_prefix fargate-
        auto_create_group true

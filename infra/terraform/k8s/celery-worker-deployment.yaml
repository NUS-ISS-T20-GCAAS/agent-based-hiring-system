# ──────────────────────────────────────────────
# Celery Worker — Deployment, HPA
# Same coordinator-agent image, different entrypoint
# Runs on Fargate (services namespace)
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: services
  labels:
    app: celery-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          # Uses the same coordinator-agent image
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/hiring-system/coordinator-agent:<IMAGE_TAG>
          command: ["celery", "-A", "app.celery_app:celery", "worker", "--loglevel=info", "--queues=workflow", "--concurrency=4"]
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hiring-system-secrets
                  key: openai-api-key
            - name: CELERY_BROKER_URL
              value: "redis://redis:6379/0"
            - name: CELERY_RESULT_BACKEND
              value: "redis://redis:6379/0"
            - name: RESUME_INTAKE_AGENT_URL
              value: "http://resume-intake-agent:8000"
            - name: SKILL_ASSESSMENT_AGENT_URL
              value: "http://skill-assessment-agent:8000"
            - name: SCREENING_AGENT_URL
              value: "http://screening-agent:8000"
            - name: RANKING_AGENT_URL
              value: "http://ranking-agent:8000"
            - name: AUDIT_AGENT_URL
              value: "http://audit-agent:8000"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: hiring-system-secrets
                  key: db-host
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "hiring_system"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hiring-system-secrets
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hiring-system-secrets
                  key: db-password
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: celery-worker-hpa
  namespace: services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: celery-worker
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

# ──────────────────────────────────────────────
# Resume Intake Agent — Deployment, Service, HPA
# Runs on Fargate (services namespace)
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-intake-agent
  namespace: services
  labels:
    app: resume-intake-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resume-intake-agent
  template:
    metadata:
      labels:
        app: resume-intake-agent
    spec:
      containers:
        - name: resume-intake-agent
          # Replace <ACCOUNT_ID> and <REGION> after terraform apply
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/hiring-system/resume-intake-agent:<IMAGE_TAG>
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hiring-system-secrets
                  key: openai-api-key
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: hiring-system-secrets
                  key: db-host
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "hiring_system"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hiring-system-secrets
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hiring-system-secrets
                  key: db-password
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: resume-intake-agent
  namespace: services
  labels:
    app: resume-intake-agent
spec:
  type: ClusterIP
  selector:
    app: resume-intake-agent
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: resume-intake-agent-hpa
  namespace: services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: resume-intake-agent
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

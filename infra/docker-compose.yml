version: '3.8'

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - coordinator-agent
    networks:
      - app-net  

  coordinator-agent:
    build:
      context: ../services/coordinator-agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - AUDIT_AGENT_URL=http://audit-agent:8000
      - SKILL_ASSESSMENT_AGENT_URL=http://skill-assessment-agent:8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=hiring_system
      - DB_USER=user
      - DB_PASSWORD=password
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      resume-intake-agent:
        condition: service_healthy
      skill-assessment-agent:
        condition: service_healthy
      screening-agent:
        condition: service_healthy
      audit-agent:
        condition: service_healthy
    networks:
      - app-net  

  resume-intake-agent:
    build:
      context: ../services/resume-intake-agent
      dockerfile: Dockerfile
    ports:
      - "8001:8000"  # Assuming similar port
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 2s
      retries: 5  
    networks:
      - app-net  

  screening-agent:
    build:
      context: ../services/screening-agent
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 2s
      retries: 5  
    networks:
      - app-net  

  skill-assessment-agent:
    build:
      context: ../services/skill-assessment-agent
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 2s
      retries: 5
    networks:
      - app-net

  ranking-agent:
    build:
      context: ../services/ranking-agent
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 2s
      retries: 5
    networks:
      - app-net  

  audit-agent:
    build:
      context: ../services/audit-agent
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 2s
      retries: 5
    networks:
      - app-net  

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: hiring_system
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d hiring_system"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    networks:
      - app-net  

  db-migrate:
    image: postgres:15
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: []
    command:
      - /bin/sh
      - -ec
      - |
        psql -h postgres -p 5432 -U user -d hiring_system -v ON_ERROR_STOP=1 -f /seed/init_db.sql
        for file in /migrations/*.sql; do
          [ -f "$$file" ] || continue
          echo "Applying migration: $$(basename "$$file")"
          psql -h postgres -p 5432 -U user -d hiring_system -v ON_ERROR_STOP=1 -f "$$file"
        done
    environment:
      PGPASSWORD: password
    volumes:
      - ../db/init_db.sql:/seed/init_db.sql:ro
      - ../db/migrations:/migrations:ro
    networks:
      - app-net  

volumes:
  postgres_data:

networks:
  app-net:
    driver: bridge  
